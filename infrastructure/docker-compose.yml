services:
  mysql:
    image: mysql:8.4
    container_name: support-mysql
    environment:
      MYSQL_DATABASE: support_agent
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  email-listener-service:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.listener
    depends_on:
      - kafka
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_INCOMING: incoming-emails
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-imap.gmail.com}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}

  email-processing-service:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.processing
    depends_on:
      - kafka
      - mysql
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_INCOMING: incoming-emails
      KAFKA_CONSUMER_GROUP: email-processing-group
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/support_agent?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      ALLOWED_ORIGINS: http://localhost:5173

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    depends_on:
      - email-processing-service
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8081

volumes:
  mysql_data:
